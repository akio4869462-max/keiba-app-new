<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>競馬アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
<h1>本日の開催レース</h1>

<div class="nav">
    <a href="/favorites">お気に入り馬一覧</a>
    <a href="/favoritesJockey">お気に入り騎手一覧</a>
</div>

<hr>

<p th:text="'取得したレース数: ' + ${#lists.size(races)}"></p>

<div th:each="race : ${races}">

    <div class="race-card">

        <h2 th:text="${race.venue} + ' ' + ${race.raceNum} + 'R : ' + ${race.raceName}">
        </h2>

        <p th:text="'発走時刻: ' + ${race.raceTime}">
        </p>

    <table border="1">
        <tr>
            <th>予想順位</th>
            <th>馬番</th>
            <th>馬名</th>
            <th>騎手</th>
            <th>オッズ</th>
            <th>前走着順</th>
            <th>予想スコア</th>
            <th>予想理由</th>
        </tr>

        <tr th:each="horse, stat : ${race.horses}">
            <td>
                <span th:if="${stat.index == 0}">🥇1位</span>
                <span th:if="${stat.index == 1}">🥈2位</span>
                <span th:if="${stat.index == 2}">🥉3位</span>
                <span th:if="${stat.index >= 3}"
                      th:text="${stat.index + 1} + '位'"></span>
            </td>
            <td th:text="${horse.umaban}"></td>
            <td>
                <div class="horse-name" th:text="${horse.name}"></div>

                <form th:action="@{/favorite/add}"
                      method="post"
                      class="inline-form">

                    <input type="hidden"
                           name="horseName"
                           th:value="${horse.name}" />

                    <button type="submit" class="register-btn">
                        ★登録
                    </button>
                </form>
            </td>
            <td>
                <div class="jockey-name" th:text="${horse.jockeyName}"></div>

                <form th:action="@{/favoriteJockey/add}"
                      method="post"
                      class="inline-form">

                    <input type="hidden"
                           name="jockeyName"
                           th:value="${horse.jockeyName}" />

                    <button type="submit" class="register-btn">
                        ★登録
                    </button>
                </form>
            </td>
            <td class="odds"
                th:text="${horse.odds}">
            </td>
            <td th:text="${horse.lastRace != null ? horse.lastRace.displayText : 'データなし'}"></td>
            <td th:text="${#numbers.formatDecimal(horse.predictionScore, 1, 1)}"></td>
            <td th:text="${horse.predictionReason}"></td>
        </tr>
    </table>

    </div>
    <hr>

</div>
</div>
</body>
</html>
