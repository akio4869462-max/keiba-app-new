<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>競馬アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
<h1>本日の開催レース</h1>

<div class="nav">
    <a href="/favorites">お気に入り馬一覧</a>
    <a href="/favoritesJockey">お気に入り騎手一覧</a>
</div>

<hr>

<p th:text="'取得したレース数: ' + ${#lists.size(races)}"></p>

<div th:each="race : ${races}">

    <div class="race-card">

        <h2 th:text="${race.venue} + ' ' + ${race.raceNum} + 'R : ' + ${race.raceName}">
        </h2>

        <p th:text="'発走時刻: ' + ${race.raceTime}">
        </p>

    <table border="1">
        <tr>
            <th>馬番</th>
            <th>馬名</th>
            <th>騎手</th>
            <th>オッズ</th>
        </tr>

        <tr th:each="horse : ${race.horses}">
            <td th:text="${horse.umaban}"></td>
            <td>
                <span th:text="${horse.name}"></span>
                <form th:action="@{/favorite/add}"
                      method="post"
                      style="display:inline;">

                    <input type="hidden"
                           name="horseName"
                           th:value="${horse.name}" />

                    <button type="submit" class="register-btn">
                        ★登録
                    </button>
                </form>
            </td>
            <td>
                <span th:text="${horse.jockeyName}"></span>
                <form th:action="@{/favoriteJockey/add}"
                      method="post"
                      style="display:inline;">

                    <input type="hidden"
                           name="jockeyName"
                           th:value="${horse.jockeyName}" />

                    <button type="submit" class="register-btn">
                        ★登録
                    </button>
                </form>
            </td>
            <td class="odds"
                th:text="${horse.odds}">
            </td>
        </tr>
    </table>

    </div>

    <hr>

</div>
</div>
</body>
</html>
