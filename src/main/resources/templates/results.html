<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>予想結果検証</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🏇 競馬予想アプリ</span>
        <div class="d-flex gap-1 ms-auto">
            <a class="nav-link" href="/favorites">⭐ お気に入り馬</a>
            <a class="nav-link" href="/favoritesJockey">⭐ お気に入り騎手</a>
            <a class="nav-link active" href="/results">📊 予想結果検証</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">

    <a href="/races" class="back-link">← レース一覧へ戻る</a>

    <h1 class="page-title mb-4">📊 予想結果検証</h1>

    <!-- サマリーカード -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${raceCount}"></div>
                <div class="stat-label">検証レース数</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number"
                     th:text="${#numbers.formatDecimal(top1WinRate, 1, 1)} + '%'"></div>
                <div class="stat-label">予想1位 単勝的中率</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number"
                     th:text="${#numbers.formatDecimal(top1Top3Rate, 1, 1)} + '%'"></div>
                <div class="stat-label">予想1位 複勝的中率</div>
            </div>
        </div>
    </div>

    <!-- レース別結果 -->
    <div th:each="race : ${races}" class="race-card mb-4">

        <div class="race-card-header">
            <span class="race-name fw-bold" th:text="${race.displayRaceName}"></span>
        </div>

        <div class="table-wrapper">
            <table class="table race-table mb-0">
                <thead>
                <tr>
                    <th class="text-center" style="width: 80px">予想順位</th>
                    <th>馬名</th>
                    <th class="text-center" style="width: 90px">スコア</th>
                    <th class="text-center" style="width: 90px">実際の着順</th>
                    <th class="text-center" style="width: 120px">判定</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="horse, stat : ${race.horses}"
                    th:classappend="${stat.index == 0} ? 'rank-1' : (${stat.index == 1} ? 'rank-2' : (${stat.index == 2} ? 'rank-3' : ''))">

                    <td class="text-center">
                        <span th:if="${stat.index == 0}" class="rank-badge rank-gold">🥇 1位</span>
                        <span th:if="${stat.index == 1}" class="rank-badge rank-silver">🥈 2位</span>
                        <span th:if="${stat.index == 2}" class="rank-badge rank-bronze">🥉 3位</span>
                        <span th:if="${stat.index >= 3}" class="rank-badge rank-other"
                              th:text="${stat.index + 1} + '位'"></span>
                    </td>

                    <td class="horse-name" th:text="${horse.name}"></td>

                    <td class="text-center">
                        <span class="score-badge"
                              th:text="${#numbers.formatDecimal(horse.predictionScore, 1, 1)}"></span>
                    </td>

                    <td class="text-center fw-bold"
                        th:text="${horse.actualRace != null ? horse.actualRace.rank + '着' : '不明'}"></td>

                    <td class="text-center">
                        <span th:if="${horse.actualRace != null and stat.index == 0 and horse.actualRace.rank == 1}"
                              class="result-win">◎ 単勝的中</span>
                        <span th:if="${horse.actualRace != null and stat.index < 3 and horse.actualRace.rank <= 3 and not (stat.index == 0 and horse.actualRace.rank == 1)}"
                              class="result-fuku">○ 複勝圏</span>
                        <span th:if="${horse.actualRace == null or horse.actualRace.rank > 3}"
                              class="result-miss">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
