<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>収集状況</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🏇 競馬予想アプリ</span>
        <div class="d-flex gap-1 ms-auto">
            <a class="nav-link" href="/races">📋 出馬表</a>
            <a class="nav-link" href="/predict">🎯 予想</a>
            <a class="nav-link" href="/favorites">⭐ お気に入り馬</a>
            <a class="nav-link" href="/favoritesJockey">⭐ お気に入り騎手</a>
            <a class="nav-link" href="/results">📊 検証</a>
            <a class="nav-link" href="/results/races">🏁 結果</a>
            <a class="nav-link" href="/favorites/today">🌅 今日の予定</a>
            <a class="nav-link active" href="/status">⚙️ 状況</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">

    <a href="/races" class="back-link">← レース一覧へ戻る</a>

    <h1 class="page-title mb-4">⚙️ 収集状況</h1>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:if="${circuitRemainingSeconds > 0}">⛔</div>
                <div class="stat-number" th:if="${circuitRemainingSeconds == 0}">✅</div>
                <div class="stat-label" th:if="${circuitRemainingSeconds > 0}"
                     th:text="'一時停止中（残り' + ${circuitRemainingSeconds} + '秒）'"></div>
                <div class="stat-label" th:if="${circuitRemainingSeconds == 0}">サーキットブレーカー稼働中</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:if="${isCollecting}">🔄</div>
                <div class="stat-number" th:if="${not isCollecting}">💤</div>
                <div class="stat-label" th:if="${isCollecting}">結果収集を実行中</div>
                <div class="stat-label" th:if="${not isCollecting}">待機中</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" style="font-size: 1.1rem"
                     th:text="${lastRunAt != null ? lastRunAt : '未実行'}"></div>
                <div class="stat-label">直近の結果収集の実行日時</div>
            </div>
        </div>
    </div>

    <p class="text-muted small" th:text="'直近の実行結果: ' + ${lastRunSummary}"></p>

    <h2 class="h5 mt-4 mb-3">追跡中のレースURL</h2>
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalTrackedUrlCount}"></div>
                <div class="stat-label">追跡URL総数</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card">
                <div class="stat-number" th:text="${pendingUrlCount}"></div>
                <div class="stat-label">結果未収集件数</div>
            </div>
        </div>
    </div>

    <h2 class="h5 mt-4 mb-3">蓄積データ</h2>
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalResultRecords}"></div>
                <div class="stat-label">検証結果件数（馬別）</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalPayoutRecords}"></div>
                <div class="stat-label">払戻金件数</div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
