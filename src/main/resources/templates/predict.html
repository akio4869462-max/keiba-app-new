<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>競馬予想</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🏇 競馬予想アプリ</span>
        <div class="d-flex gap-1 ms-auto">
            <a class="nav-link" href="/races">📋 出馬表</a>
            <a class="nav-link active" href="/predict">🎯 予想</a>
            <a class="nav-link" href="/favorites">⭐ お気に入り馬</a>
            <a class="nav-link" href="/favoritesJockey">⭐ お気に入り騎手</a>
            <a class="nav-link" href="/results">📊 検証</a>
            <a class="nav-link" href="/results/races">🏁 結果</a>
            <a class="nav-link" href="/favorites/today">🌅 今日の予定</a>
            <a class="nav-link" href="/status">⚙️ 状況</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">

    <div class="d-flex align-items-center mb-3">
        <h1 class="page-title mb-0">🎯 本日の予想</h1>
        <span class="ms-3 badge bg-secondary fs-6"
              th:text="${racesByVenue.size()} + ' 開催場'"></span>
    </div>

    <!-- 開催場タブ -->
    <ul class="nav nav-tabs venue-tabs" id="venueTabs" role="tablist">
        <li class="nav-item" th:each="entry, stat : ${racesByVenue}" role="presentation">
            <button class="nav-link"
                    th:classappend="${stat.first} ? ' active'"
                    th:id="'tab-' + ${stat.index}"
                    data-bs-toggle="tab"
                    th:attr="data-bs-target='#pane-' + ${stat.index}, aria-controls='pane-' + ${stat.index}"
                    type="button"
                    role="tab">
                <span th:text="${entry.key}"></span>
                <span class="badge bg-secondary ms-1"
                      th:text="${#lists.size(entry.value)} + 'R'"></span>
            </button>
        </li>
    </ul>

    <!-- タブコンテンツ（開催場ごと） -->
    <div class="tab-content venue-tab-content">
        <div class="tab-pane fade"
             th:each="entry, stat : ${racesByVenue}"
             th:classappend="${stat.first} ? ' show active'"
             th:id="'pane-' + ${stat.index}"
             role="tabpanel"
             th:attr="aria-labelledby='tab-' + ${stat.index}">

            <div th:each="race : ${entry.value}" class="race-card mb-4">

                <div class="race-card-header">
                    <div class="d-flex align-items-center gap-3">
                        <span class="venue-badge" th:text="${race.venue}"></span>
                        <span class="race-number" th:text="${race.raceNum} + 'R'"></span>
                        <span class="race-name" th:text="${race.raceName}"></span>
                    </div>
                    <div class="race-time">
                        🕐 <span th:text="${race.raceTime} + ' 発走'"></span>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table class="table table-hover race-table">
                        <thead>
                        <tr>
                            <th class="text-center">予想順位</th>
                            <th class="text-center">馬番</th>
                            <th>馬名</th>
                            <th>騎手</th>
                            <th class="text-center">オッズ</th>
                            <th>前走成績</th>
                            <th class="text-center">スコア</th>
                            <th>予想理由</th>
                            <th>AIコメント</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="horse, stat : ${race.horses}"
                            th:classappend="${stat.index == 0} ? 'rank-1' : (${stat.index == 1} ? 'rank-2' : (${stat.index == 2} ? 'rank-3' : ''))">

                            <td class="text-center">
                                <span th:if="${stat.index == 0}" class="rank-badge rank-gold">🥇 1位</span>
                                <span th:if="${stat.index == 1}" class="rank-badge rank-silver">🥈 2位</span>
                                <span th:if="${stat.index == 2}" class="rank-badge rank-bronze">🥉 3位</span>
                                <span th:if="${stat.index >= 3}" class="rank-badge rank-other"
                                      th:text="${stat.index + 1} + '位'"></span>
                            </td>

                            <td class="text-center">
                                <span class="waku-badge" th:classappend="'waku-' + ${horse.waku}"
                                      th:text="${horse.umaban}"></span>
                            </td>

                            <td>
                                <a class="horse-name" th:if="${horse.netkeibaHorseUrl != null and !horse.netkeibaHorseUrl.isEmpty()}"
                                   th:href="${horse.netkeibaHorseUrl}" th:text="${horse.name}"
                                   target="_blank" rel="noopener"></a>
                                <div class="horse-name" th:unless="${horse.netkeibaHorseUrl != null and !horse.netkeibaHorseUrl.isEmpty()}"
                                     th:text="${horse.name}"></div>
                                <div class="text-muted small" th:if="${horse.sire != null and !horse.sire.isEmpty()}">
                                    父:<span th:text="${horse.sire}"></span>
                                </div>
                                <div class="text-muted small" th:if="${horse.dam != null and !horse.dam.isEmpty()}">
                                    母:<span th:text="${horse.dam}"></span>
                                </div>
                                <div class="text-muted small" th:if="${horse.damSire != null and !horse.damSire.isEmpty()}">
                                    母父:<span th:text="${horse.damSire}"></span>
                                </div>
                                <form th:action="@{/favorite/add}" method="post">
                                    <input type="hidden" name="horseName" th:value="${horse.name}" />
                                    <button type="submit" class="btn-register">⭐ 登録</button>
                                </form>
                            </td>

                            <td>
                                <a class="jockey-name" th:if="${horse.netkeibaJockeyUrl != null and !horse.netkeibaJockeyUrl.isEmpty()}"
                                   th:href="${horse.netkeibaJockeyUrl}" th:text="${horse.jockeyName}"
                                   target="_blank" rel="noopener"></a>
                                <div class="jockey-name" th:unless="${horse.netkeibaJockeyUrl != null and !horse.netkeibaJockeyUrl.isEmpty()}"
                                     th:text="${horse.jockeyName}"></div>
                                <form th:action="@{/favoriteJockey/add}" method="post">
                                    <input type="hidden" name="jockeyName" th:value="${horse.jockeyName}" />
                                    <button type="submit" class="btn-register">⭐ 登録</button>
                                </form>
                            </td>

                            <td class="text-center">
                                <span class="odds-badge"
                                      th:classappend="${horse.odds <= 3.0} ? ' odds-fav' : (${horse.odds <= 10.0} ? ' odds-mid' : ' odds-long')"
                                      th:text="${horse.odds}"></span>
                            </td>

                            <td class="past-races-cell">
                                <div class="past-race-item"
                                     th:text="${horse.lastRace != null ? horse.lastRace.displayText : 'データなし'}"></div>
                                <div class="past-race-item"
                                     th:text="${horse.secondLastRace != null ? horse.secondLastRace.displayText : 'データなし'}"></div>
                                <div class="past-race-item"
                                     th:text="${horse.thirdLastRace != null ? horse.thirdLastRace.displayText : 'データなし'}"></div>
                            </td>

                            <td class="text-center">
                                <span class="score-badge"
                                      th:text="${#numbers.formatDecimal(horse.predictionScore, 1, 1)}"></span>
                            </td>

                            <td>
                                <div class="prediction-reason-cell"
                                     th:text="${horse.predictionReason}"></div>
                            </td>

                            <td>
                                <div class="ai-comment-cell"
                                     th:text="${horse.aiComment != null ? horse.aiComment : '—'}"></div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
