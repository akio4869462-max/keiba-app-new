<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>今日のお気に入りレース</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <span class="navbar-brand">🏇 競馬予想アプリ</span>
        <div class="d-flex gap-1 ms-auto">
            <a class="nav-link" href="/races">📋 出馬表</a>
            <a class="nav-link" href="/predict">🎯 予想</a>
            <a class="nav-link" href="/favorites">⭐ お気に入り馬</a>
            <a class="nav-link" href="/favoritesJockey">⭐ お気に入り騎手</a>
            <a class="nav-link" href="/results">📊 検証</a>
            <a class="nav-link" href="/results/races">🏁 結果</a>
            <a class="nav-link active" href="/favorites/today">🌅 今日の予定</a>
        </div>
    </div>
</nav>

<div class="page-wrapper">

    <a href="/races" class="back-link">← レース一覧へ戻る</a>

    <h1 class="page-title mb-4">🌅 今日のお気に入りレース</h1>

    <h2 class="h5 mb-3">⭐ お気に入り馬が出走するレース</h2>

    <p class="text-muted" th:if="${#lists.isEmpty(horseMatches)}">
        今日、お気に入り馬が出走するレースはありません。
    </p>

    <div class="table-wrapper mb-4" th:unless="${#lists.isEmpty(horseMatches)}">
        <table class="table race-table mb-0">
            <thead>
            <tr>
                <th class="text-center" style="width: 90px">発走時刻</th>
                <th>レース</th>
                <th>馬名</th>
                <th class="text-center" style="width: 90px">オッズ</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${horseMatches}">
                <td class="text-center fw-bold" th:text="${entry.race.raceTime}"></td>
                <td th:text="${entry.race.displayRaceName}"></td>
                <td class="horse-name" th:text="${entry.horse.name}"></td>
                <td class="text-center" th:text="${entry.horse.odds}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <h2 class="h5 mb-3">⭐ お気に入り騎手が騎乗するレース</h2>

    <p class="text-muted" th:if="${#lists.isEmpty(jockeyMatches)}">
        今日、お気に入り騎手が騎乗するレースはありません。
    </p>

    <div class="table-wrapper mb-4" th:unless="${#lists.isEmpty(jockeyMatches)}">
        <table class="table race-table mb-0">
            <thead>
            <tr>
                <th class="text-center" style="width: 90px">発走時刻</th>
                <th>レース</th>
                <th>騎手</th>
                <th>馬名</th>
                <th class="text-center" style="width: 90px">オッズ</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${jockeyMatches}">
                <td class="text-center fw-bold" th:text="${entry.race.raceTime}"></td>
                <td th:text="${entry.race.displayRaceName}"></td>
                <td class="jockey-name" th:text="${entry.horse.jockeyName}"></td>
                <td class="horse-name" th:text="${entry.horse.name}"></td>
                <td class="text-center" th:text="${entry.horse.odds}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
