<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お気に入り馬一覧</title>
</head>
<body>

<h1>お気に入り馬一覧</h1>

<ul>
    <li th:each="horse : ${favorites}">

        <span th:text="${horse.horseName}"></span>

        <form th:action="@{/favorite/delete}"
              method="post"
              style="display:inline;">

            <input type="hidden"
                   name="id"
                   th:value="${horse.id}" />

            <button type="submit">
                削除
            </button>

        </form>

    </li>
</ul>

<a href="/races">レース一覧へ戻る</a>

</body>
</html>
